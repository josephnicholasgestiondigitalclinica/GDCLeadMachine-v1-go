[phases.setup]
nixPkgs = ["python311", "nodejs_18"]

[phases.install]
cmds = [
  "cd backend && pip install -r requirements.txt",
  "cd frontend && npm install --legacy-peer-deps",
]

[phases.build]
cmds = [
  "cd frontend && CI=false npm run build",
]

[start]
cmd = "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
